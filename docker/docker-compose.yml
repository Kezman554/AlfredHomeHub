# Alfred Home Hub services. Run on the Raspberry Pi 5 (ARM64).
# Deploy with scripts/ha-setup.sh.
#
# Ports on the Pi:
#   8123 — Home Assistant
#   8200 — Vault API (vault content + rolling to-do writes for LAN clients)

services:
  homeassistant:
    container_name: homeassistant
    # Official HA image; multi-arch, resolves to ARM64 on the Pi.
    image: ghcr.io/home-assistant/home-assistant:stable

    volumes:
      # Persist HA config (configuration.yaml, scenes, DB) on the host,
      # alongside this compose file. Created at runtime by ha-setup.sh.
      - ./ha-config:/config
      # Share the host clock so HA logs and automations use Pi local time.
      - /etc/localtime:/etc/localtime:ro

    # Host networking is required for device discovery (mDNS/SSDP) of
    # bulbs, Echos, and other LAN devices. HA serves on host port 8123.
    network_mode: host

    # Restart on crash and on Pi reboot, but stay down if stopped manually.
    restart: unless-stopped

  vault-api:
    container_name: vault-api
    build:
      context: ../src/vault_api
      dockerfile: Dockerfile

    environment:
      # Path *inside* the container — matches the mount below.
      VAULT_PATH: /vault
      # Non-interactive SSH for git push/pull from inside the container.
      # accept-new tolerates a missing github.com entry in known_hosts without
      # ever accepting a *changed* host key.
      GIT_SSH_COMMAND: ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new

    volumes:
      # The vault clone on the Pi, kept current by the vault-sync cron.
      # Read-write: the chalkboard write endpoints edit, commit, and push.
      - ${VAULT_HOST_PATH:-/home/kezman554/alfred-vault}:/vault
      # The Pi user's SSH dir, for the vault deploy key (which has write
      # access) and known_hosts. Read-only; the container UID (1000) matches
      # kezman554 so the key's 600 perms still allow reading.
      - /home/kezman554/.ssh:/home/vaultapi/.ssh:ro
      - /etc/localtime:/etc/localtime:ro

    # Published on all interfaces so LAN devices (the alarm app) can reach it.
    ports:
      - "8200:8200"

    restart: unless-stopped
